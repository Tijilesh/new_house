spring.application.name=buildtrack-backend
server.port=8082

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/house_expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Set MYSQL_PASSWORD env var or edit this line
spring.datasource.password=${MYSQL_PASSWORD:Root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:please-change-this-to-a-256-bit-base64-secret-string-for-prod-XYZ123}
app.jwt.expiration-ms=86400000

# ---- Bootstrap admin user (created on first startup if missing) ----
app.admin.username=admin
app.admin.password=admin123

# ---- CORS ----
app.cors.allowed-origins=*